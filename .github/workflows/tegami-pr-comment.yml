name: Tegami PR Comment

# Posts the preview built by tegami-pr.yml as a PR comment. Triggered by
# `workflow_run` so it runs in the base-repo context with write permissions,
# without ever executing the PR's code.
on:
  workflow_run:
    workflows: ['Tegami PR']
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment:
    name: Post preview comment
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    # No container image: tegami's git plugin needs the runner's git against
    # the checkout workspace (same reason as version.yml). node:24-slim ships
    # without git, so the container variant can't run tegami.
    runs-on: depot-ubuntu-22.04-2
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: pnpm setup
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Download preview
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: tegami-pr-preview
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Post preview comment
        run: pnpm tegami pr comment tegami-pr-preview.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

