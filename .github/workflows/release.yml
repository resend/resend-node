name: Release

# Publishing half of the release flow (versioning runs on canary and
# preview-* branches, see version.yml). Publishes whatever the committed
# publish lock holds that isn't on npm yet, then creates the git tag and
# GitHub release. Each branch publishes a different channel:
#
#   - canary: prerelease versions only (x.y.z-canary.N, npm dist-tag
#     "canary"), so prereleases ship as soon as their version PR merges.
#     Stable versions never publish from here — they wait for promotion.
#   - preview-<feature>: prerelease versions only, for single-feature betas
#     (x.y.z-preview-<feature>.N under the "preview-<feature>" npm dist-tag —
#     tegami derives the dist-tag from the branch's prerelease config).
#   - main: everything, once canary is promoted.
#
# Already-published versions are skipped, so re-runs, promotions with nothing
# pending, and prereleases that already shipped from a branch are safe no-ops.
on:
  push:
    branches:
      - main
      - canary
      - "preview-*"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push git tags, create GitHub releases
  id-token: write # npm trusted publishing (OIDC) — no NPM_TOKEN needed

jobs:
  release:
    name: Publish
    # npm trusted publishing (OIDC) is only supported on GitHub-hosted runners,
    # so this job intentionally does not use the depot-* runners or a
    # container image like the rest of this repo's workflows.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: pnpm setup
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Check release channel
        id: channel
        run: echo "prerelease=$(node -p "require('./package.json').version.includes('-')")" >> "$GITHUB_OUTPUT"

      # `tegami publish` publishes via `pnpm publish`, which runs this
      # package's own `prepublishOnly` script (`pnpm run build`) — no separate
      # build step needed here.
      - name: Publish
        if: github.ref_name == 'main' || steps.channel.outputs.prerelease == 'true'
        run: pnpm tegami publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
