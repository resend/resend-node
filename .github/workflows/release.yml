name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # commit version bumps, push the Version Packages branch
  id-token: write # npm trusted publishing (OIDC) — no NPM_TOKEN needed
  pull-requests: write # open the Version Packages PR

jobs:
  release:
    name: Version & publish
    # npm trusted publishing (OIDC) is only supported on GitHub-hosted runners,
    # so this job intentionally does not use the depot-* runners or a
    # container image like the rest of this repo's workflows.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: pnpm setup
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install packages
        run: pnpm install --frozen-lockfile

      # `tegami ci` publishes via `pnpm publish`, which runs this package's
      # own `prepublishOnly` script (`pnpm run build`) — no separate build
      # step needed here.
      - name: Version & publish
        run: pnpm tegami ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

