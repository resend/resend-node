name: Tegami PR

# Builds the release-preview comment for a PR. Runs on `pull_request` (NOT
# `pull_request_target`), so it executes untrusted PR code and stays
# read-only. The companion tegami-pr-comment.yml posts the result with write
# permissions without ever running PR code.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  preview:
    name: Release preview
    # No container image: tegami's git plugin needs the runner's git against
    # the checkout workspace (same reason as version.yml). node:24-slim ships
    # without git, so the container variant can't run tegami.
    runs-on: depot-ubuntu-22.04-2
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: pnpm setup
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Release preview
        run: pnpm tegami pr preview --artifact tegami-pr-preview.md

      - name: Upload preview
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tegami-pr-preview
          path: tegami-pr-preview.md
